<div class="step-card">

  <div>
    <h2 class="step-card__title">Skills &amp; Education</h2>
    <p class="step-card__subtitle">Add or remove skills, and verify your education details.</p>
  </div>

  <!-- Skills -->
  <div class="field-group">
    <div class="skills-label">Skills</div>

    <div class="skills-tags">
      @for (skill of skillList(); track skill) {
        <span class="skill-tag">
          {{ skill }}
          <button class="skill-tag__remove" type="button" (click)="removeSkill(skill)" [attr.aria-label]="'Remove ' + skill">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </span>
      }
    </div>

    <div class="skill-input-row">
      <input
        class="field__input"
        type="text"
        [ngModel]="newSkill()"
        (ngModelChange)="newSkill.set($event)"
        (keydown)="onSkillKeydown($event)"
        placeholder="Type a skill and press Enter…"
      />
      <button class="btn btn--ghost" type="button" (click)="addSkill()">Add</button>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- Education -->
  <div class="field-group">
    <div class="edu-header">
      <div class="skills-label">Education</div>
      <button class="btn btn--ghost btn--sm" type="button" (click)="addEdu()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>
    </div>

    @for (edu of eduList(); track edu.id; let i = $index) {
      <div class="edu-entry">
        <div class="field-row">
          <div class="field">
            <label class="field__label" [for]="'institution-' + i">Institution</label>
            <input [id]="'institution-' + i" class="field__input" type="text"
              [ngModel]="edu.institution" (ngModelChange)="updateEdu(i, 'institution', $event)"
              placeholder="University name" />
          </div>
          <div class="field">
            <label class="field__label" [for]="'year-' + i">Graduation year</label>
            <input [id]="'year-' + i" class="field__input" type="text"
              [ngModel]="edu.graduationYear" (ngModelChange)="updateEdu(i, 'graduationYear', $event)"
              placeholder="e.g. 2020" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field__label" [for]="'degree-' + i">Degree</label>
            <input [id]="'degree-' + i" class="field__input" type="text"
              [ngModel]="edu.degree" (ngModelChange)="updateEdu(i, 'degree', $event)"
              placeholder="e.g. B.S." />
          </div>
          <div class="field">
            <label class="field__label" [for]="'field-' + i">Field of study</label>
            <input [id]="'field-' + i" class="field__input" type="text"
              [ngModel]="edu.field" (ngModelChange)="updateEdu(i, 'field', $event)"
              placeholder="e.g. Computer Science" />
          </div>
        </div>
        @if (eduList().length > 1) {
          <button class="btn btn--danger-ghost" type="button" (click)="removeEdu(i)">Remove</button>
        }
      </div>

      @if (i < eduList().length - 1) {
        <div class="section-divider"></div>
      }
    }
  </div>

  <div class="step-actions">
    <button class="btn btn--ghost" type="button" (click)="onBack()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back
    </button>
    <button class="btn btn--primary" type="button" (click)="onNext()">
      Next — Review
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

</div>
