<section class="validate-page">

  <!-- Page header with stepper -->
  <div class="validate-page__header">
    <button class="validate-page__back" (click)="goBack()" type="button" aria-label="Go back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back
    </button>

    <!-- Stepper -->
    <nav class="stepper" aria-label="Validation steps">
      @for (step of steps; track step.id) {
        <button
          class="stepper__step"
          [class.stepper__step--active]="currentStep() === step.id"
          [class.stepper__step--done]="currentStep() > step.id"
          [class.stepper__step--upcoming]="currentStep() < step.id"
          (click)="goToStep(step.id)"
          [disabled]="currentStep() < step.id"
          type="button"
          [attr.aria-current]="currentStep() === step.id ? 'step' : null"
        >
          <span class="stepper__bubble">
            @if (currentStep() > step.id) {
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            } @else {
              {{ step.id + 1 }}
            }
          </span>
          <span class="stepper__label">{{ step.shortLabel }}</span>
        </button>

        @if (step.id < steps.length - 1) {
          <div class="stepper__connector" [class.stepper__connector--done]="currentStep() > step.id" aria-hidden="true"></div>
        }
      }
    </nav>
  </div>

  <!-- Step content -->
  <div class="validate-page__body">

    @if (resume()) {
      @switch (currentStep()) {

        @case (0) {
          <app-personal-info-step
            [resume]="resume()!"
            (personalChanged)="patchPersonal($event)"
            (contactChanged)="patchContact($event)"
            (next)="goNext()"
          />
        }

        @case (1) {
          <app-experience-step
            [experience]="resume()!.experience"
            (experienceChanged)="patchExperience($event)"
            (next)="goNext()"
            (back)="goBack()"
          />
        }

        @case (2) {
          <app-skills-education-step
            [skills]="resume()!.skills"
            [education]="resume()!.education"
            (skillsChanged)="patchSkills($event)"
            (educationChanged)="patchEducation($event)"
            (next)="goNext()"
            (back)="goBack()"
          />
        }

        @case (3) {
          <app-review-step
            [resume]="resume()!"
            (back)="goBack()"
            (confirm)="onConfirm()"
          />
        }

      }
    }

  </div>

</section>
