<section class="home">

  <!-- Background grid decoration -->
  <div class="home__grid-bg" aria-hidden="true"></div>

  <!-- Glow orb -->
  <div class="home__glow" aria-hidden="true"></div>

  <div class="home__content">

    <!-- Badge -->
    <div class="home__badge">
      <span class="home__badge-dot"></span>
      AI-Powered Resume Tailoring
    </div>

    <!-- Headline -->
    <h1 class="home__headline">
      Land the role<br />
      <span class="home__headline-accent">you actually want.</span>
    </h1>

    <!-- Subheading -->
    <p class="home__sub">
      Upload your resume once. RoleFit tailors it to every job description
      you throw at it — preserving your facts, sharpening your signal.
    </p>

    <!-- CTA -->
    <button class="home__cta" (click)="onStart()" type="button">
      <span>Get Started</span>
      <svg class="home__cta-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <!-- Steps preview -->
    <div class="home__steps">
      <div class="home__step">
        <span class="home__step-num">01</span>
        <span class="home__step-label">Upload Resume</span>
      </div>
      <div class="home__step-divider" aria-hidden="true"></div>
      <div class="home__step">
        <span class="home__step-num">02</span>
        <span class="home__step-label">Add Job Descriptions</span>
      </div>
      <div class="home__step-divider" aria-hidden="true"></div>
      <div class="home__step">
        <span class="home__step-num">03</span>
        <span class="home__step-label">Download Tailored Resumes</span>
      </div>
    </div>

  </div>

</section>
